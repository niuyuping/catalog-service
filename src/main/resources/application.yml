spring:
  application:
    name: catalog-service
  config:
    import: "configserver:"
  cloud:
    config:
      uri: http://localhost:8888
      request-connect-timeout: 5000
      request-read-timeout: 5000
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 5000
        multiplier: 1.5
      
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/polardb_catalog
    username: admin
    password: Ping808888
    pool:
      initial-size: 5
      max-size: 5
      max-create-connection-time: 2000

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/polardb_catalog
    user: admin
    password: Ping808888

server:
  port: 9001
  tomcat:
    connection-timeout: 2s
    keep-alive-timeout: 15s
    threads:
      max: 50
      min-spare: 5

management:
  endpoints:
    web:
      exposure:
        include: refresh